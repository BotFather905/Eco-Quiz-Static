<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarthQuiz - Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .answer-btn:active { transform: scale(0.95); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .float-icon { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-emerald-50 text-slate-800 min-h-screen">

    <div id="app" class="max-w-4xl mx-auto min-h-screen flex flex-col">
        <div id="progress-container" class="hidden w-full h-2 bg-emerald-100 sticky top-0 z-50">
            <div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-500" style="width: 0%"></div>
        </div>

        <!-- Start Screen -->
        <div id="view-start" class="flex-grow flex flex-col items-center justify-center p-6 text-center">
            <div class="glass-panel p-12 rounded-[3rem] shadow-2xl border-b-8 border-emerald-600/20 max-w-lg w-full">
                <i class="fa-solid fa-earth-americas text-8xl text-emerald-600 mb-6 float-icon"></i>
                <h1 class="text-5xl font-black tracking-tighter mb-2 text-emerald-900">EarthQuiz</h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-xs mb-10">Test Your Green Knowledge</p>
                
                <div class="space-y-4">
                    <input type="text" id="player-name" placeholder="Enter your name" 
                        class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-emerald-500 outline-none text-center text-xl font-bold shadow-inner bg-white/50">
                    <button onclick="startQuiz()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 rounded-2xl shadow-xl transition-all text-2xl active:scale-95">
                        START MISSION
                    </button>
                </div>
            </div>
        </div>

        <!-- Question Screen -->
        <div id="view-quiz" class="hidden flex-grow flex flex-col p-6 animate-in fade-in zoom-in duration-300">
            <div class="flex justify-between items-center mb-8">
                <div class="bg-white px-6 py-2 rounded-full shadow-sm border border-slate-100 font-black text-emerald-600 flex items-center gap-2">
                    QUESTION <span id="q-number">1</span>/10
                </div>
                <div class="bg-white px-6 py-2 rounded-full shadow-sm border border-slate-100 font-black text-emerald-600" id="current-score-display">
                    SCORE: 0 / 1000
                </div>
            </div>

            <h2 id="question-text" class="text-2xl md:text-4xl font-black text-slate-800 leading-tight mb-12 text-center h-32 flex items-center justify-center text-balance"></h2>

            <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- Results Screen -->
        <div id="view-results" class="hidden flex-grow flex flex-col items-center justify-center p-6 text-center">
            <div class="glass-panel p-12 rounded-[3rem] shadow-2xl w-full max-w-xl border-t-8 border-emerald-500">
                <i id="result-icon" class="text-8xl mb-6"></i>
                <h2 id="result-title" class="text-5xl font-black mb-2 text-emerald-900"></h2>
                <p id="result-subtitle" class="text-slate-500 text-xl font-bold mb-8"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-10">
                    <div class="bg-emerald-50 p-6 rounded-3xl border border-emerald-100">
                        <p class="text-xs uppercase font-black text-emerald-600">Total Points</p>
                        <p class="text-4xl font-black text-emerald-900"><span id="final-score">0</span><span class="text-xl text-emerald-600/50">/1000</span></p>
                    </div>
                    <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100">
                        <p class="text-xs uppercase font-black text-blue-600">Accuracy</p>
                        <p id="final-accuracy" class="text-4xl font-black text-blue-900">0%</p>
                    </div>
                </div>

                <button onclick="location.reload()" class="w-full bg-emerald-900 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-800 transition-all text-xl active:scale-95">
                    PLAY AGAIN
                </button>
            </div>
        </div>
    </div>

    <script>
        const SALT = "eco-protection-2024";
        
        const POOL = [
            { t: "What is the primary cause of ocean acidification?", o: ["Plastic pollution", "CO2 absorption", "Oil spills", "Overfishing"], a: 1 },
            { t: "Which type of light bulb is the most energy-efficient?", o: ["Incandescent", "Halogen", "CFL", "LED"], a: 3 },
            { t: "What is the most effective way to reduce your carbon footprint?", o: ["Recycling paper", "Eating less meat", "Using a reusable straw", "Washing clothes in cold water"], a: 1 },
            { t: "Which country produces the most wind energy globally?", o: ["USA", "China", "Germany", "Denmark"], a: 1 },
            { t: "What does 'net-zero' mean in environmental terms?", o: ["Zero waste", "No carbon emissions", "Balanced emissions and removal", "Zero plastic use"], a: 2 },
            { t: "Which layer of the atmosphere contains the ozone layer?", o: ["Troposphere", "Mesosphere", "Exosphere", "Stratosphere"], a: 3 },
            { t: "Fast fashion is primarily criticized for its impact on which resource?", o: ["Soil", "Water", "Air", "Minerals"], a: 1 },
            { t: "What is 'greenwashing'?", o: ["Cleaning plants", "Painting buildings green", "Misleading environmental claims", "Organic farming"], a: 2 },
            { t: "Which of these is NOT a renewable energy source?", o: ["Solar", "Geothermal", "Nuclear", "Hydroelectric"], a: 2 },
            { t: "What is the largest source of methane emissions from human activity?", o: ["Aviation", "Agriculture", "Landfills", "Coal mining"], a: 1 },
            { t: "How long does a plastic bottle take to decompose?", o: ["50 years", "100 years", "450 years", "Never"], a: 2 },
            { t: "Which gas is released when permafrost melts?", o: ["Oxygen", "Argon", "Methane", "Nitrogen"], a: 2 },
            { t: "What is the 'Albedo Effect'?", o: ["Plant growth", "Surface reflectivity", "Cloud formation", "Ocean currents"], a: 1 },
            { t: "Which forest is the most biodiverse on Earth?", o: ["Congo", "Daintree", "Amazon", "Taiga"], a: 2 },
            { t: "Great Garbage Patch is located in which ocean?", o: ["Atlantic", "Indian", "Pacific", "Arctic"], a: 2 },
            { t: "What percentage of plastic is actually recycled worldwide?", o: ["9%", "25%", "50%", "70%"], a: 0 },
            { t: "Which animal is the symbol for the WWF?", o: ["Polar Bear", "Tiger", "Giant Panda", "Elephant"], a: 2 },
            { t: "The Montreal Protocol was created to protect what?", o: ["Whales", "Ozone Layer", "Coral Reefs", "Glaciers"], a: 1 },
            { t: "Which diet has the lowest environmental impact?", o: ["Keto", "Paleo", "Vegan", "Pescatarian"], a: 2 },
            { t: "What is the main ingredient in most solar panels?", o: ["Carbon", "Silicon", "Copper", "Silver"], a: 1 },
            { t: "Which industry uses the most fresh water globally?", o: ["Manufacturing", "Fashion", "Agriculture", "Technology"], a: 2 },
            { t: "What is 'E-waste'?", o: ["Environmental waste", "Discarded electronics", "Energy waste", "Efficient waste"], a: 1 },
            { t: "The 'Year Without a Summer' (1816) was caused by?", o: ["Solar flares", "Volcanic eruption", "Comet strike", "Global cooling"], a: 1 },
            { t: "Which process turns sunlight into chemical energy?", o: ["Respiration", "Combustion", "Photosynthesis", "Fermentation"], a: 2 },
            { t: "What is the most common gas in Earth's atmosphere?", o: ["Oxygen", "Carbon Dioxide", "Nitrogen", "Argon"], a: 2 },
            { t: "Which ecosystem is known as the 'nurseries of the sea'?", o: ["Open Ocean", "Mangroves", "Abyssal Plain", "Kelp Forests"], a: 1 },
            { t: "What is the main cause of the 'Holocene Extinction'?", o: ["Asteroids", "Volcanoes", "Human activity", "Climate cycles"], a: 2 },
            { t: "Which chemical was banned by the Montreal Protocol?", o: ["CO2", "CFCs", "Nitrous Oxide", "Methane"], a: 1 },
            { t: "What is 'Permaculture'?", o: ["Permanent culture", "Sustainable agriculture", "Mining technique", "Weather pattern"], a: 1 },
            { t: "Which soil layer is most important for plant growth?", o: ["Bedrock", "Topsoil", "Subsoil", "Parent Material"], a: 1 },
            { t: "What does 'Composting' involve?", o: ["Burning trash", "Breaking down organic matter", "Mixing chemicals", "Freezing food"], a: 1 },
            { t: "Which continent is warming the fastest?", o: ["Africa", "Arctic", "Europe", "Australia"], a: 1 },
            { t: "What is 'Greywater'?", o: ["Sewer water", "Rainwater", "Recycled household water", "Industrial sludge"], a: 2 },
            { t: "Which organelle in plants performs photosynthesis?", o: ["Mitochondria", "Nucleus", "Chloroplast", "Vacuole"], a: 2 },
            { t: "What is the IUCN Red List?", o: ["List of polluters", "Endangered species list", "Forest fire map", "Carbon tax log"], a: 1 },
            { t: "Which energy source is 'Geothermal'?", o: ["Sun", "Wind", "Earth's heat", "Water flow"], a: 2 },
            { t: "A 'Carbon Sink' is something that...?", o: ["Releases CO2", "Stores CO2", "Measures CO2", "Bans CO2"], a: 1 },
            { t: "What is the 'Greenhouse Effect'?", o: ["Gardening", "Trapping heat in atmosphere", "Plants growing faster", "Building green homes"], a: 1 },
            { t: "Which animal group is most threatened by ocean warming?", o: ["Sharks", "Whales", "Coral polyps", "Seals"], a: 2 },
            { t: "What is 'Upcycling'?", o: ["Cycling uphill", "Creating better quality items from waste", "Downsizing", "Buying new"], a: 1 },
            { t: "Which type of car has zero tailpipe emissions?", o: ["Hybrid", "Diesel", "EV (Electric)", "LPG"], a: 2 },
            { t: "The 'Keeling Curve' measures what?", o: ["Ice melt", "Sea level", "Atmospheric CO2", "Global temp"], a: 2 },
            { t: "What is 'Deforestation'?", o: ["Planting trees", "Clearing forests", "Protecting jungles", "Forest fires"], a: 1 },
            { t: "Which material is 'Biodegradable'?", o: ["Styrofoam", "Glass", "Banana peel", "Nylon"], a: 2 },
            { t: "What is the Earth's average temperature increase goal in the Paris Agreement?", o: ["0.5C", "1.5C", "5C", "10C"], a: 1 },
            { t: "Which ocean is the saltiest?", o: ["Pacific", "Indian", "Arctic", "Atlantic"], a: 3 },
            { t: "What is 'Xeriscaping'?", o: ["Low-water landscaping", "Mountain mapping", "Deep sea diving", "Desert farming"], a: 0 },
            { t: "Which light wavelength is trapped by greenhouse gases?", o: ["Ultraviolet", "Infrared", "Visible light", "X-rays"], a: 1 },
            { t: "What is the primary food source for Polar Bears?", o: ["Fish", "Penguins", "Seals", "Plankton"], a: 2 },
            { t: "How many Earth Days have been celebrated since 1970?", o: ["25", "Over 50", "100", "10"], a: 1 }
        ];

        let activeQuiz = [];
        let currentIdx = 0;
        let score = 0;
        let playerName = "";

        async function getHash(val) {
            const msgBuffer = new TextEncoder().encode(val + SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function startQuiz() {
            playerName = document.getElementById('player-name').value.trim() || "Eco-Warrior";
            const selected = [...POOL].sort(() => 0.5 - Math.random()).slice(0, 10);
            activeQuiz = [];
            for (let item of selected) {
                const hashedAns = await getHash(item.a.toString());
                activeQuiz.push({ t: item.t, o: item.o, h: hashedAns });
            }
            document.getElementById('view-start').classList.add('hidden');
            document.getElementById('view-quiz').classList.remove('hidden');
            document.getElementById('progress-container').classList.remove('hidden');
            renderQuestion();
        }

        function renderQuestion() {
            const q = activeQuiz[currentIdx];
            document.getElementById('q-number').innerText = currentIdx + 1;
            document.getElementById('question-text').innerText = q.t;
            document.getElementById('progress-bar').style.width = `${((currentIdx) / 10) * 100}%`;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            q.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "answer-btn bg-white hover:bg-emerald-50 p-6 md:p-8 rounded-[2rem] text-xl font-bold shadow-sm border-2 border-slate-100 transition-all text-left flex items-center gap-6";
                btn.innerHTML = `<span class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-emerald-100 flex items-center justify-center text-emerald-600 font-black shrink-0">${i+1}</span> <span class="flex-grow">${opt}</span>`;
                btn.onclick = () => handleChoice(i);
                grid.appendChild(btn);
            });
        }

        async function handleChoice(choice) {
            const q = activeQuiz[currentIdx];
            const hashedChoice = await getHash(choice.toString());
            if (hashedChoice === q.h) score += 100;
            document.getElementById('current-score-display').innerText = `SCORE: ${score} / 1000`;
            currentIdx++;
            if (currentIdx < 10) renderQuestion(); else showResults();
        }

        function showResults() {
            document.getElementById('view-quiz').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('view-results').classList.remove('hidden');
            const accuracy = (score / 1000) * 100;
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-accuracy').innerText = `${accuracy}%`;
            const icon = document.getElementById('result-icon');
            const title = document.getElementById('result-title');
            const sub = document.getElementById('result-subtitle');
            if (accuracy >= 90) {
                icon.className = "fa-solid fa-crown text-amber-400 text-8xl mb-6 float-icon";
                title.innerText = "Earth Guardian!";
                sub.innerText = `You are a true hero, ${playerName}!`;
            } else if (accuracy >= 60) {
                icon.className = "fa-solid fa-leaf text-emerald-500 text-8xl mb-6 float-icon";
                title.innerText = "Eco Expert";
                sub.innerText = `Impressive work, ${playerName}!`;
            } else {
                icon.className = "fa-solid fa-seedling text-amber-600 text-8xl mb-6 float-icon";
                title.innerText = "Sprouting Citizen";
                sub.innerText = `Keep growing your green knowledge, ${playerName}.`;
            }
        }
    </script>
</body>
</html>
